# web(프론트) 서비스 전용 Railway 설정.
# 이 서비스의 Config-as-code 경로를 apps/web/railway.toml 로 지정해서 사용한다.
# (루트 railway.toml은 api 서비스용 apps/api/Dockerfile을 가리키므로 반드시 분리.)
# dockerfilePath는 빌드 컨텍스트(레포 루트) 기준 경로다 → 루트 디렉터리는 기본(레포 루트) 유지.
[build]
builder        = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
healthcheckPath    = "/"
healthcheckTimeout = 60
restartPolicyType  = "ON_FAILURE"
