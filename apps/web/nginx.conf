# nginx 공식 이미지가 envsubst로 ${PORT}를 런타임 값으로 치환한다.
# $uri 등 nginx 변수는 환경변수가 아니므로 그대로 보존된다.
server {
    listen       ${PORT};
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    gzip              on;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # 해시된 정적 에셋 — 장기 불변 캐시
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA 폴백 — React Router 클라이언트 라우팅(/login, /projects/:id 등)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
