# nginx 공식 이미지가 envsubst로 ${PORT}를 런타임 값으로 치환한다.
# $uri 등 nginx 변수는 환경변수가 아니므로 그대로 보존된다.
server {
    listen       ${PORT};
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    gzip              on;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # 해시된 정적 에셋 — 장기 불변 캐시
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # REST API 프록시 (Same-Site 쿠키 차단 우회를 위해 백엔드로 라우팅)
    # envsubst가 시작 시 ${VITE_API_BASE}를 치환하므로 resolver가 필요 없습니다.
    # 끝에 / 를 붙여서 Nginx가 자동으로 /api/ 접두사를 제거하고 백엔드로 넘기게 합니다.
    location /api/ {
        proxy_pass ${VITE_API_BASE}/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 프록시 (선택사항, 필요시 주석 해제)
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }

    # SPA 폴백 — React Router 클라이언트 라우팅(/login, /projects/:id 등)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
