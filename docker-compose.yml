services:
  db:
    image: postgres:16
    container_name: markflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB:       ${POSTGRES_DB:-markflow}
    ports:
      - "5432:5432"
    volumes:
      - markflow-db-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: markflow-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@markflow.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  markflow-db-data:
